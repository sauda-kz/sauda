spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:sauda_dev}
    username: ${DB_USER:sauda}
    password: ${DB_PASSWORD:sauda}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true

logging:
  level:
    root: INFO
    com.sauda: DEBUG
    org.hibernate.SQL: DEBUG

sauda:
  integrations:
    whatsapp:
      api-url: http://localhost:9090/mock/whatsapp
    payment:
      provider-url: http://localhost:9090/mock/payment
    supplier:
      import-url: http://localhost:9090/mock/supplier
