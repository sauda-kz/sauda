spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME:sauda_prod}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: false

logging:
  level:
    root: WARN
    com.sauda: INFO
    org.springframework: WARN

sauda:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}
  storage:
    endpoint: ${S3_ENDPOINT}
    access-key: ${S3_ACCESS_KEY}
    secret-key: ${S3_SECRET_KEY}
    bucket: ${S3_BUCKET}
    region: ${S3_REGION:us-east-1}
    max-file-size-bytes: ${RAW_UPLOAD_MAX_BYTES:52428800}
  integrations:
    whatsapp:
      api-url: ${WHATSAPP_API_URL}
    payment:
      provider-url: ${PAYMENT_PROVIDER_URL}
    supplier:
      import-url: ${SUPPLIER_IMPORT_URL}

management:
  endpoint:
    health:
      show-details: never

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
