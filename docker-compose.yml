services:
  postgres:
    image: postgres:16-alpine
    container_name: sauda-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-sauda_dev}
      POSTGRES_USER: ${DB_USER:-sauda}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-sauda}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PUBLISH_PORT:-5432}:5432"
    networks:
      - sauda-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-sauda} -d ${DB_NAME:-sauda_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: sauda-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "${S3_PUBLISH_PORT:-9000}:9000"
      - "${S3_CONSOLE_PORT:-9001}:9001"
    networks:
      - sauda-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ${BACKEND_IMAGE:-sauda-backend:local}
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.backend
    container_name: sauda-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-sauda_dev}
      DB_USER: ${DB_USER:-sauda}
      DB_PASSWORD: ${DB_PASSWORD:-sauda}
      SERVER_PORT: 8080
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-sauda-raw}
      S3_REGION: ${S3_REGION:-us-east-1}
    networks:
      - sauda-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health/liveness || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  frontend:
    image: ${FRONTEND_IMAGE:-sauda-frontend:local}
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    container_name: sauda-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - sauda-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:1.27-alpine
    container_name: sauda-nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - sauda-network

networks:
  sauda-network:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
