services:
  postgres:
    image: postgres:16-alpine
    container_name: sauda-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-sauda_dev}
      POSTGRES_USER: ${DB_USER:-sauda}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-sauda}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sauda-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-sauda} -d ${DB_NAME:-sauda_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ${BACKEND_IMAGE:-sauda-backend:local}
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.backend
    container_name: sauda-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-sauda_dev}
      DB_USER: ${DB_USER:-sauda}
      DB_PASSWORD: ${DB_PASSWORD:-sauda}
      SERVER_PORT: 8080
    networks:
      - sauda-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health/liveness || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  frontend:
    image: ${FRONTEND_IMAGE:-sauda-frontend:local}
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    container_name: sauda-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - sauda-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:1.27-alpine
    container_name: sauda-nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - sauda-network

networks:
  sauda-network:
    driver: bridge

volumes:
  postgres_data:
