name: Back-merge hotfix to develop

# После merge hotfix/* → main автоматически создаёт PR main → develop
on:
  pull_request:
    types:
      - closed
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  create-back-merge-pr:
    name: Create back-merge PR
    if: |
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'hotfix/')
    runs-on: ubuntu-latest

    steps:
      - name: Create pull request to develop
        uses: actions/github-script@v7
        with:
          script: |
            const hotfixBranch = context.payload.pull_request.head.ref;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = `chore: back-merge hotfix ${hotfixBranch} to develop`;
            const head = 'main';
            const base = 'develop';
            const body = [
              '## Automatic back-merge',
              '',
              `Hotfix branch \`${hotfixBranch}\` was merged into \`main\`.`,
              '',
              'This PR syncs the fix into `develop`.',
              '',
              '- [ ] CI passed',
              '- [ ] Ready to merge',
            ].join('\n');

            const existing = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              head: `${owner}:${head}`,
              base,
            });

            if (existing.data.length > 0) {
              core.info(`Open back-merge PR already exists: #${existing.data[0].number}`);
              return;
            }

            const pr = await github.rest.pulls.create({
              owner,
              repo,
              title,
              head,
              base,
              body,
            });

            core.info(`Created back-merge PR #${pr.data.number}`);
