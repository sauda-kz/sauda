name: Backend CI

on:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  push:
    branches:
      - main
      - develop
      - "hotfix/**"
      - "release/**"
      - "feature/**"
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/sauda-api

jobs:
  build-and-test:
    name: Build, Test and Quality Gates
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/sauda-api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('backend/sauda-api/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Verify formatting, static analysis, tests and coverage
        run: ./mvnw -B verify

      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-jacoco-report
          path: backend/sauda-api/target/site/jacoco/

      - name: Build JAR
        run: ./mvnw -B -DskipTests package

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infrastructure/docker/Dockerfile.backend
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
