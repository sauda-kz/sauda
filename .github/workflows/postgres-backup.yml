name: PostgreSQL Backup

on:
  schedule:
    # 02:00 UTC daily
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to backup
        required: true
        default: all
        type: choice
        options:
          - all
          - dev
          - test
          - production

permissions:
  contents: read

jobs:
  backup-skipped:
    name: Backup disabled (MVP)
    if: vars.DEPLOY_ENABLED != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Print notice
        run: |
          echo "PostgreSQL backup is disabled while DEPLOY_ENABLED != true."
          echo "When the server is ready:"
          echo "  1. Configure GitHub Secrets (SERVER_HOST, SERVER_USER, SERVER_SSH_KEY)"
          echo "  2. Create environments: dev, test, production"
          echo "  3. Set repository variable DEPLOY_ENABLED=true"
          echo "  4. Set secret BACKUP_GPG_PASSPHRASE (per environment)"
          echo "Optional: BACKUP_RETENTION_DAYS (default 14)"
          echo "On server: sudo apt install -y gnupg"

  backup:
    name: Backup ${{ matrix.environment }}
    if: >-
      vars.DEPLOY_ENABLED == 'true' &&
      (
        (github.event_name == 'schedule' && matrix.on_schedule) ||
        (github.event_name == 'workflow_dispatch' &&
         (inputs.environment == 'all' || inputs.environment == matrix.environment))
      )
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - environment: dev
            on_schedule: true
          - environment: test
            on_schedule: true
          - environment: production
            on_schedule: false
    environment: ${{ matrix.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy backup script to server
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: infrastructure/deploy/backup-postgres.sh
          target: /opt/sauda/

      - name: Run PostgreSQL backup
        env:
          BACKUP_GPG_PASSPHRASE: ${{ secrets.BACKUP_GPG_PASSPHRASE }}
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: BACKUP_GPG_PASSPHRASE
          script: |
            set -euo pipefail
            if ! command -v gpg >/dev/null 2>&1; then
              echo "gpg not found on server. Run: sudo apt install -y gnupg"
              exit 1
            fi
            PASSPHRASE_FILE="$(mktemp)"
            chmod 600 "${PASSPHRASE_FILE}"
            printf '%s' "${BACKUP_GPG_PASSPHRASE}" > "${PASSPHRASE_FILE}"
            chmod +x /opt/sauda/infrastructure/deploy/backup-postgres.sh
            RETENTION_DAYS="${{ vars.BACKUP_RETENTION_DAYS || '14' }}" \
            BACKUP_GPG_PASSPHRASE_FILE="${PASSPHRASE_FILE}" \
              /opt/sauda/infrastructure/deploy/backup-postgres.sh
            shred -u "${PASSPHRASE_FILE}" 2>/dev/null || rm -f "${PASSPHRASE_FILE}"
