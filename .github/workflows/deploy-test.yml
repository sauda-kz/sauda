name: Deploy TEST

on:
  push:
    branches:
      - "release/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}/sauda-api
  FRONTEND_IMAGE: ghcr.io/${{ github.repository }}/sauda-web

jobs:
  deploy-skipped:
    name: Deploy disabled (MVP)
    if: vars.DEPLOY_ENABLED != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Print notice
        run: |
          echo "CD deploy is disabled for MVP."
          echo "Set repository variable DEPLOY_ENABLED=true when the TEST server is ready."
          echo "See docs/setup.md for details."

  deploy:
    name: Deploy to TEST
    if: vars.DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    environment: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infrastructure/docker/Dockerfile.backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.BACKEND_IMAGE }}:test-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infrastructure/docker/Dockerfile.frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
            ${{ env.FRONTEND_IMAGE }}:test-latest
          build-args: |
            VITE_API_URL=/api
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to TEST server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/sauda
            export BACKEND_IMAGE=${{ env.BACKEND_IMAGE }}:test-latest
            export FRONTEND_IMAGE=${{ env.FRONTEND_IMAGE }}:test-latest
            export SPRING_PROFILES_ACTIVE=test
            if docker compose version >/dev/null 2>&1; then
              COMPOSE="docker compose"
            elif command -v docker-compose >/dev/null 2>&1; then
              COMPOSE="docker-compose"
            else
              echo "Docker Compose not found. Run: apt install -y docker-compose"
              exit 1
            fi
            $COMPOSE pull
            $COMPOSE down --remove-orphans
            $COMPOSE up -d
