spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:sauda_test}
    username: ${DB_USER:sauda}
    password: ${DB_PASSWORD:sauda}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: false

logging:
  level:
    root: INFO
    com.sauda: INFO

sauda:
  integrations:
    whatsapp:
      api-url: http://mock-server:9090/mock/whatsapp
    payment:
      provider-url: http://mock-server:9090/mock/payment
    supplier:
      import-url: http://mock-server:9090/mock/supplier
